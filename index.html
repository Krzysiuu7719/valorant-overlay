<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Valorant Overlay 1:1 z Cieniami</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: transparent;
    font-family: 'Montserrat', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: 100vh;
}

.overlay {
    display: flex;
    align-items: center;
    gap: 6px; 
}

/* GŁÓWNY STYL BOKSU (Z przezroczystością i mocnym cieniem) */
.box {
    height: 48px; 
    background: rgba(24, 21, 21, 0.85); /* 15% przezroczystości tła */
    border: 1px solid rgba(35, 31, 32, 0.9); 
    border-radius: 4px;
    display: flex;
    align-items: center;
    position: relative;
    overflow: hidden;
    
    /* CIEŃ POD BOKSAMI - daje głębię na streamie */
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.6), 0 2px 4px rgba(0, 0, 0, 0.4);
}

/* DOLNA KRESKA */
.box::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    height: 3px;
    background: #33a86b; 
}

.rank-box::after {
    background: #ffffff;
}

/* BOKS RANGA */
.rank-box {
    padding-left: 12px;
    padding-right: 16px;
    gap: 8px;
}

/* CIEŃ DLA IKONY RANGI */
.rank-icon {
    width: 28px;
    height: 28px;
    object-fit: contain;
    filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
}

.rank-wrapper {
    display: flex;
    align-items: center;
    gap: 8px;
}

/* CIEŃ DLA TEKSTÓW (poprawia czytelność na jasnym tle w grze) */
.rank-name {
    color: #ffffff;
    font-size: 16px;
    font-weight: 900; 
    letter-spacing: 0.2px;
    text-transform: uppercase;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
}

.rr {
    color: #9c9c9c; 
    font-size: 15px;
    font-weight: 800;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
}

/* MAŁE BOKSY */
.small-box {
    width: 82px; 
    justify-content: center;
}

.wl-box {
    width: 92px; 
}

.stat {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: -0.3px;
    display: flex;
    gap: 6px;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
}

/* KOLORY TEKSTU */
.green {
    color: #33a86b;
}

.red {
    color: #cc4c4c; 
}
</style>
</head>
<body>

<div class="overlay">

    <div class="box rank-box">
        <img class="rank-icon" id="rankIcon" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" />
        <div class="rank-wrapper">
            <div class="rank-name" id="rankName">...</div>
            <div class="rr" id="rr">...</div>
        </div>
    </div>

    <div class="box box-wl small-box wl-box">
        <div class="stat" id="wl">
            <span class="green">...</span>
            <span class="red">...</span>
        </div>
    </div>

    <div class="box small-box" id="rrGainBox">
        <div class="stat green" id="rrGain">...</div>
    </div>

</div>

<script>
const API_KEY = "HDEV-14fbb92f-70b8-4a92-8371-a10bb2d451b9";
const REGION = "eu";
const NAME = "ttv krzysix";
const TAG = "EUPL";

const sheet = window.document.styleSheets[0];

async function loadData() {
    try {
        const response = await fetch(
            `https://api.henrikdev.xyz/valorant/v1/mmr-history/${REGION}/${NAME}/${TAG}`,
            {
                headers: {
                    "Authorization": API_KEY
                }
            }
        );

        const resData = await response.json();
        
        if (!resData || resData.status !== 200 || !resData.data || resData.data.length === 0) {
            console.error("Błąd pobierania danych.");
            return;
        }

        const latestMatch = resData.data[0];

        // 1. AKTUALIZACJA RANGI I IKONY
        document.getElementById("rankName").innerText = latestMatch.currenttierpatched;
        document.getElementById("rr").innerText = `${latestMatch.ranking_in_tier}RR`;
        document.getElementById("rankIcon").src = latestMatch.images.small;

        // 2. OSTATNIA ZMIANA RR
        const lastChange = latestMatch.mmr_change_to_last_game;
        const rrGainEl = document.getElementById("rrGain");

        if (lastChange >= 0) {
            rrGainEl.innerText = `+${lastChange} RR`;
            rrGainEl.className = "stat green";
            sheet.insertRule('#rrGainBox::after { background: #33a86b !important; }', sheet.cssRules.length);
        } else {
            rrGainEl.innerText = `${lastChange} RR`;
            rrGainEl.className = "stat red";
            sheet.insertRule('#rrGainBox::after { background: #cc4c4c !important; }', sheet.cssRules.length);
        }

        // 3. LICZENIE ZWYCIĘSTW I PORAŻEK
        let wins = 0;
        let losses = 0;

        const currentSessionMatches = resData.data.slice(0, 4); 
        
        currentSessionMatches.forEach(match => {
            if (match.mmr_change_to_last_game > 0) {
                wins++;
            } else if (match.mmr_change_to_last_game < 0) {
                losses++;
            }
        });

        document.getElementById("wl").innerHTML = `
            <span class="green">${wins}W</span>
            <span class="red">${losses}L</span>
        `;

    } catch (err) {
        console.error("Błąd ładowania danych: ", err);
    }
}

loadData();
setInterval(loadData, 30000);
</script>

</body>
</html>
